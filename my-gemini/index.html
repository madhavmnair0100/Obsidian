<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemini Mobile GUI</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #1a73e8; align-self: flex-end; margin-left: auto; }
        .bot { background: #333; align-self: flex-start; }
        #input-area { display: flex; padding: 10px; background: #1e1e1e; }
        input { flex: 1; padding: 12px; border: none; border-radius: 5px; background: #333; color: white; }
        button { margin-left: 10px; padding: 10px 20px; border: none; border-radius: 5px; background: #1a73e8; color: white; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="prompt" placeholder="Ask Gemini...">
        <button onclick="ask()">Send</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        
        // REPLACE THE STRING BELOW WITH YOUR ACTUAL API KEY
        const API_KEY = "AIzaSyAc-3Bir2EWl3Z_INc47UophlRnlMsO_tM";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.ask = async () => {
            const input = document.getElementById('prompt');
            const chat = document.getElementById('chat');
            if (!input.value) return;

            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userText = input.value;
            input.value = "";

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(userText);
                const response = await result.response;
                chat.innerHTML += `<div class="msg bot">${response.text()}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg bot" style="color:red">Error: ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        };
    </script>
</body>
</html>
